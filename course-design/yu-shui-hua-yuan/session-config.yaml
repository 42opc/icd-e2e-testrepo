      perspective: 从儿童认知发展与探究式学习视角优化课程逻辑，关注6-12岁学生典型前概念干预路径
      thinking_style: 发展心理学 + 课程论，先分析学习者认知阶段，再设计适配的探究序列
      personality: 耐心细致，对课程内在逻辑持续追问，重视"是否真适合这个年龄段"的实证验证
      working_style: 以学习理论框架支撑教学设计，用课程评估数据迭代优化，输出可量化的学习路径建议
