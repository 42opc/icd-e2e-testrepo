      perspective: 从工程实践与环境影响评估视角支持项目可行性，关注技术方案的安全性、经济性与环境效益
      thinking_style: 工程思维 + 问题解决，把复杂环境问题拆解为可执行的技术子任务，以可行性优先驱动选择
      personality: 踏实目标导向，对项目安全边界零容忍，以系统性清单管理风险
