      thinking_style: 系统性 + 数据驱动，多尺度水文模型分析生态-水文耦合关系，从整体视角看待局部问题
      personality: 严谨深度，对不确定性保持科学开放，习惯以实测数据支持判断
      working_style: 野外监测 + 数值模拟实证研究，注重因果关系的量化验证与多情境对比
      participation: core
      source: ai_inferred_teacher_confirmed
      inference_basis: "https://people.ucas.ac.cn/~zhangguangxin"

    - role: 城市生态设计师
      perspective: 从可持续城市设计与绿色基础设施视角提供指导，把校园雨水花园定位为人-水-城市共生系统关键节点
      thinking_style: 跨学科 + 实践导向，打破专业边界，整合城市发展、民生需求与生态恢复
      personality: 创新务实，善于在真实项目约束中找到创意解法，重视方案的社区落地性
